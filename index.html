<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PT Sarana Nusantara Niagatama | Premium Golf Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --blue: #003366; --gold: #d4af37; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; color: #333; line-height: 1.6; }
        nav { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: fixed; width: 100%; top: 0; z-index: 100; }
        .logo { font-weight: 700; color: var(--blue); }
        #hero { height: 80vh; background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1535131749006-b7f58c99034b?q=80&w=1000') center/cover; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding-top: 60px; }
        .btn { background: var(--gold); color: white; padding: 12px 24px; text-decoration: none; border-radius: 5px; font-weight: 600; margin-top: 20px; display: inline-block; }
        section { padding: 80px 10%; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; margin-top: 30px; }
        .item { background: #f4f4f4; padding: 20px; border-radius: 8px; font-weight: 600; border-bottom: 3px solid var(--gold); }
        footer { background: #111; color: white; padding: 20px; text-align: center; }
    </style>
</head>
<body>
    <nav><div class="logo">PT SARANA NUSANTARA NIAGATAMA</div></nav>
    <header id="hero">
        <h1>Premium Golf Distribution & Club Fitting</h1>
        <p>Official Distributor Indonesia since 2004</p>
        <a href="mailto:rid1lim@snngolf.com" class="btn">Contact Us</a>
    </header>
    <section>
        <h2>Authorized Brands</h2>
        <div class="grid">
            <div class="item">True Temper</div>
            <div class="item">Project X</div>
            <div class="item">UST Mamiya</div>
            <div class="item">KBS</div>
            <div class="item">Golf Pride</div>
            <div class="item">Graphite Design</div>
        </div>
    </section>
    <footer><p>&copy; 2026 PT Sarana Nusantara Niagatama</p></footer>
</body>
</html>
